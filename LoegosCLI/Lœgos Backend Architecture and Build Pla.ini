Lœgos Backend Architecture and Build Plan

Date: April 9, 2026
Status: Working architecture draft
Purpose: Define the backend architecture, system boundaries, core services, data model, and phased build plan required to turn Lœgos from a language spec into a working product.

⸻

1. Why This Document Exists

The language now has enough structure that the next bottleneck is not theory. It is buildability.

This document answers a narrower question than the canon, kernel, or UX notes:

What has to exist in the backend for Lœgos to work as a real system?

That means:
	•	where source and witness live
	•	where compile happens
	•	where shape checking happens
	•	where moves and returns are executed and recorded
	•	how boxes, windows, receipts, and versions are stored
	•	how Seven interacts with the system without becoming a black box
	•	what the minimum viable system is for v0.x

This document now serves two purposes:
	1.	define the target architecture the system may grow into
	2.	define the minimal first build cut that should actually be shipped first

The target architecture should not be confused with the first usable version.
That distinction is now explicit.

This is the infrastructure view.

⸻

2. Target Architecture vs First Shippable Cut

The system should be held in two layers at once.

2.1 Target architecture

This is the fuller architecture required if Lœgos becomes a durable multi-user product with stored history, integrations, compare views, and governed AI participation.

It includes:
	•	layered services
	•	relational persistence
	•	object storage
	•	witness versioning infrastructure
	•	compiler/runtime separation
	•	event and receipt history
	•	API surfaces for clients and integrations

2.2 First shippable cut

This is the smallest system that makes Lœgos real enough to use this month.

It should include only:
	•	compiler library
	•	local CLI
	•	filesystem-backed source and witness files
	•	SQLite or JSON-backed metadata persistence
	•	compile artifact generation
	•	manual runtime path
	•	manual return ingestion
	•	status inspection
	•	fixture corpus execution

2.3 Rule

The target architecture remains useful as a map.
The first shippable cut governs what should actually be built first.

The mistake would be to implement the full target architecture before the compiler, checker, and local runtime are proven useful on real windows.

⸻

3. System Thesis

Lœgos is not just an editor.
It is a layered system with four backend responsibilities:
	1.	Store source truth — boxes, witness objects, compiled structures, receipts, and versions
	2.	Compile structure — parse ASCII Lœgos, bind symbols, check kinds, run shape rules, emit assembly graph
	3.	Run windows — issue moves, hold awaiting states, accept returns, update runtime state
	4.	Preserve auditability — keep witness identity, receipt provenance, diagnostics, and history intact

A weak implementation would collapse these into one app server.
A stronger implementation keeps them separate enough that truth-preserving boundaries remain visible.

⸻

4. High-Level Architecture

The system should be thought of as six major layers.

3.1 Client Layer

User-facing surfaces:
	•	chat / mirror UI
	•	witness reader / listener
	•	compare view
	•	raw .loe editor
	•	receipt review UI

The client is not the source of truth.
It is a renderer and editor for backend state.

3.2 API Layer

Responsible for:
	•	auth
	•	box CRUD
n- witness upload / retrieval
	•	source save / load
	•	compile requests
	•	runtime actions (issue move, append return, close window)
	•	diagnostics retrieval
	•	receipt and history retrieval

This can begin as one service.

3.3 Compiler Layer

Responsible for:
	•	parsing ASCII source
	•	building AST
	•	symbol binding
	•	kind checking
	•	shape checking
	•	assembly graph generation
	•	deterministic diagnostics

This should be a distinct service or module with a stable interface, even if initially deployed inside the API service.

3.4 Runtime Layer

Responsible for:
	•	move execution
	•	runtime adapter dispatch
	•	awaiting state tracking
	•	return ingestion
	•	closure transitions
	•	runtime event log

The runtime does not compile.
The compiler does not execute.

That split is load-bearing.

3.5 Storage Layer

Responsible for:
	•	relational system state
	•	immutable witness objects / versions
	•	compiled artifacts
	•	runtime event log
	•	receipt ledger
	•	diagnostic history

3.6 Integration Layer

Responsible for:
	•	external witness import
	•	move adapters (manual, shell, http, queue)
	•	return channels (user, system, service, registry, etc.)
	•	future connectors

