11. Witness Pipeline

The witness pipeline is where messy input becomes stable source material.

10.1 Steps
	1.	upload raw artifact
	2.	store raw object
	3.	extract/normalize text
	4.	compute hash / identity token
	5.	create witness object record
	6.	allow block extraction / marking
	7.	expose witness to compiler and compare UI

10.2 Important rule

Witness versions must be immutable once created.

A changed witness becomes a new witness version.
It does not mutate the old one.

That rule protects seal integrity.

⸻

12. Compare Architecture

Compare is not a UI garnish. It needs backend support.

Compare should be backed by:
	•	witness version(s)
	•	source document version
	•	compile artifact version
	•	diffable spans or block references
	•	diagnostics tied to spans

The backend should be able to answer:
	•	what witness version was compiled
	•	what changed since last compile
	•	which diagnostics were introduced or resolved
	•	which witness blocks fed which structures

⸻

13. Event and History Model

Everything meaningful should become history.

At minimum, preserve:
	•	source revisions
	•	witness versions
	•	compile artifacts
	•	diagnostics
	•	runtime events
	•	returns
	•	closure changes

This is not just for debugging.
It is the product’s memory and explainability substrate.

⸻

14. Minimal v0.x Build Order

Build this in the smallest viable sequence.

Phase 1 — compiler-first spine

Build first:
	•	ASCII parser
	•	symbol binder
	•	kind checker
	•	shape checker
	•	assembly graph JSON emitter
	•	corpus-driven test suite

No runtime execution yet beyond mocked states.

Phase 1.5 — first runnable local cut

Before building full persistence or service boundaries, make the system runnable locally.

Build:
	•	a tiny CLI
	•	filesystem-backed .loe source loading
	•	filesystem-backed witness references
	•	compile artifact output to disk
	•	manual return ingestion
	•	local window status inspection

Suggested commands:
	•	loe compile path/to/file.loe
	•	loe run path/to/file.loe
	•	loe status path/to/file.loe
	•	loe return path/to/file.loe

This phase exists so the team can dogfood real windows immediately rather than waiting for the full backend stack.

Phase 2 — source + witness persistence

Then build:
	•	box/window persistence
	•	witness metadata persistence
	•	source save/load
	•	compile artifact persistence
	•	diagnostics retrieval

Phase 3 — runtime basics

Then build:
	•	manual adapter
	•	return ingestion
	•	awaiting state handling
	•	closure transitions
	•	receipt ledger

Phase 4 — compare + raw editor

Then build:
	•	.loe editor backend support
	•	compare endpoints
	•	graph inspection endpoints
	•	version history

Phase 5 — real adapters

Then add:
	•	shell adapter
	•	http adapter
	•	queue adapter

That is enough to make the system real without overbuilding.

