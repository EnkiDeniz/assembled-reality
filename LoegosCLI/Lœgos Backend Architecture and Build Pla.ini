16. Minimal First Usable Version

The first usable version should be much smaller than the full target architecture.

16.1 Recommended implementation shape

For the first usable cut, prefer:
	•	single process
	•	compiler library in-process
	•	local filesystem for source and witness files
	•	SQLite or JSON for metadata persistence
	•	no networked services unless absolutely necessary
	•	no object storage requirement
	•	no queue infrastructure requirement

16.2 Minimal witness model

A witness in the first version can be only:
	•	file path
	•	content hash
	•	identity token from the source line

The compiler reads the file at compile time, records the path/hash/identity triple, and stores that in the compile artifact.

No full normalization service is required for the first local version.
No object-storage-backed witness pipeline is required for the first local version.

16.3 Minimal runtime model

The first runtime should support only:
	•	manual move adapter
	•	manual return ingestion
	•	open / awaiting / sealed / flagged / stopped / rerouted window states
	•	receipt recording

This is enough to test the language honestly against real personal and product windows.

16.4 Minimal UI requirement

A CLI is sufficient to make the first version real.
A local web UI is optional.

The CLI should be able to:
	•	compile a .loe file
	•	print human-readable diagnostics
	•	emit assembly graph JSON
	•	mark a move as issued
	•	accept a manual return
	•	show window status

16.5 Why this cut matters

The first usable version should optimize for:
	•	dogfooding speed
	•	checker correctness
	•	corpus execution
	•	real decision windows
	•	low implementation overhead

It should not optimize for scale, multi-user collaboration, or broad integration depth yet.

