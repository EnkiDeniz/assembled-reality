6. Data Storage Strategy

The system needs two storage modes.

5.1 Relational database

Use for:
	•	users
	•	boxes
	•	windows
	•	source document metadata
	•	witness metadata
	•	compile artifact metadata
	•	runtime events
	•	receipts
	•	diagnostics

Postgres is the obvious first choice.

5.2 Object storage

Use for:
	•	uploaded raw files
	•	normalized witness snapshots
	•	large AST/graph artifacts if needed
	•	audio and image sources

S3-compatible storage is sufficient.

5.3 Why split this way

Relational storage preserves transactional integrity.
Object storage preserves immutable artifacts.

That split matches the truth model.

⸻

7. Compiler Architecture

The compiler should be a standalone library or service with a pure interface.

6.1 Input
	•	ASCII .loe source
	•	referenced witness metadata
	•	compile context (box/window ids, compiler version)

6.2 Output
	•	AST
	•	symbol table
	•	kind report
	•	shape report
	•	assembly graph
	•	deterministic diagnostics

6.3 Compiler passes
	1.	lexical scan
	2.	parse
	3.	bind references
	4.	kind pass
	5.	shape pass
	6.	assembly graph emit

6.4 Important principle

Compile must be deterministic for the same source and witness identities.

This is critical for trust and replayability.

6.5 Suggested implementation choice

Rust is probably the stronger fit because:
	•	compiler-style workloads
	•	deterministic data structures
	•	good JSON ecosystem
	•	strong typing
	•	easier long-term extension than a quick scripting path

Zig is also viable if the team prefers smaller binaries and simpler deployment, but Rust is probably the safer first implementation.

⸻

8. Runtime Architecture

The runtime is the system that turns compiled structure into world-facing activity.

7.1 Responsibilities
	•	issue moves
	•	mark window awaiting
	•	ingest returns
	•	transition runtime state
	•	record receipt objects
	•	apply closure decisions

7.2 Runtime adapter model

Initial adapters:
	•	manual
	•	shell
	•	http
	•	queue

7.3 Adapter behavior

manual
Creates a pending move event. Waits for user/system-entered return.

shell
Runs a configured shell command. Captures stdout/stderr as runtime payload.

http
Executes a configured HTTP request. Stores request/response metadata.

queue
Pushes a message/job into a queue for external handling.

7.4 Return ingestion

Returns should come through one normalized endpoint regardless of source.

Return payload should include:
	•	window_id
	•	return_verb
	•	channel
	•	value
	•	scalar_kind (optional)
	•	source_ref (optional)
	•	provenance_metadata
	•	timestamp

7.5 Open and awaiting windows

The runtime must hold unresolved windows honestly.

That means:
	•	no auto-seal
	•	no fake progress
	•	stale awaiting detection
	•	ability to resume later
	•	visibility into expected return horizon

⸻

9. Seven’s Backend Role

Seven should not have privileged hidden powers.

Backend-wise, Seven is a client of the same system primitives as everyone else.

Seven may:
	•	propose source edits
	•	propose compiled interpretations
	•	trigger compile
	•	recommend moves/tests
	•	append suggested returns for review
	•	recommend closure state

Seven may not:
	•	bypass compile
	•	bypass shape checking
	•	seal unilaterally
	•	mutate witness identity silently
	•	turn story into proof without runtime contact

This is crucial.

Seven is not the backend.
Seven is an actor on top of the backend.

