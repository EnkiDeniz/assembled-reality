17. Acceptance Criteria for the Architecture Doc

This architecture is good enough when the team can answer these questions without improvising:
	1.	Where is source truth stored?
	2.	Where does compile happen?
	3.	Where does runtime happen?
	4.	How are witness versions preserved?
	5.	How are receipts recorded?
	6.	How does awaiting work?
	7.	How does Seven interact without bypassing truth boundaries?
	8.	What gets built first?

If those questions are answerable, the architecture is serving its job.

⸻

18. Closing

The backend exists to protect the truth boundaries the language claims.

If witness mutates silently, the system fails.
If compile and runtime collapse, the system fails.
If Seven can bypass shape checking, the system fails.
If awaiting cannot be held honestly, the system fails.

So the architecture is not neutral plumbing.
It is the mechanical form of the product’s ethics.

Lœgos only works if the backend preserves the same distinctions the language enforces.