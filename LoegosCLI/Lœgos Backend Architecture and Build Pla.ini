5. Canonical Backend Objects

These are the core backend entities.

4.1 User

Authenticated actor.

4.2 Box

The top-level container for one assembly space.

Fields:
	•	box_id
	•	owner_user_id
	•	name
	•	created_at
	•	updated_at
	•	current_window_id
	•	status

4.3 Window

A bounded assembly run inside a box.

Fields:
	•	window_id
	•	box_id
	•	aim_text
	•	source_document_id (optional)
	•	compiled_graph_id (optional)
	•	runtime_state (open|awaiting|sealed|flagged|stopped|rerouted)
	•	active_closure_line_index (optional)
	•	created_at
	•	updated_at

4.4 Witness Object

Normalized source-facing object.

Fields:
	•	witness_id
	•	box_id
	•	origin_type (pdf|md|txt|image|audio|url|imported)
	•	source_uri or object reference
	•	content_hash
	•	identity_token (v_*|hash_*|snapshot_*)
	•	normalized_text
	•	created_at
	•	version_number
	•	supersedes_witness_id (optional)

4.5 Source Document

ASCII Lœgos source for a window.

Fields:
	•	source_document_id
	•	window_id
	•	ascii_source
	•	rendered_cache (optional)
	•	version_number
	•	created_at
	•	created_by

4.6 Compile Artifact

Deterministic result of compile.

Fields:
	•	compiled_graph_id
	•	source_document_id
	•	ast_json
	•	symbol_table_json
	•	kind_report_json
	•	shape_report_json
	•	assembly_graph_json
	•	compiler_version
	•	created_at

4.7 Runtime Event

Every move, return, and closure should become an event.

Fields:
	•	event_id
	•	window_id
	•	event_type (move_issued|test_declared|return_recorded|closure_applied|state_changed|witness_drift_detected)
	•	payload_json
	•	created_at
	•	created_by

4.8 Receipt

Return-bearing proof object.

Fields:
	•	receipt_id
	•	window_id
	•	return_verb
	•	channel
	•	scalar_kind (optional)
	•	value_text or value_json
	•	provenance_metadata
	•	created_at
	•	linked_event_id

4.9 Diagnostic

Structured compiler/runtime issue.

Fields:
	•	diagnostic_id
	•	window_id
	•	phase (parse|kind|shape|runtime)
	•	rule_id
	•	severity (error|warning|info)
	•	message
	•	source_span
	•	created_at

