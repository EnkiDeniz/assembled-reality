          - heading "Normalization is not verification" [level=2] [ref=e81]
          - paragraph [ref=e82]: Loegos can transcribe voice, structure documents, extract text, or describe an image. That makes a source more readable. It does not, by itself, make the source more trustworthy.
          - paragraph [ref=e83]: Verification changes how much weight a source carries. Normalization only changes how usable it is.
